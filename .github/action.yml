name: Gridfinder

description: A GitHub Action for running the Gridfinder Python application.

inputs:
  argument:
    description: 'An argument for the application'
    required: false
    default: 'default_value'

runs:
  using: 'python'
  steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run the application
      run: |
        python app.py ${{ inputs.argument }}
