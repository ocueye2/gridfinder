<style>
    .items-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center; /* Centers the grid of results */
        padding: 10px;
    }

    .item-card {
        text-decoration: none;
        background: #ffffff; /* Matches card-bg */
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #e2e8f0; /* Matches --border */
        text-align: center;
        width: 150px;
        transition: all 0.2s ease;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .item-card:hover {
        transform: translateY(-5px);
        border-color: #6366f1; /* Matches --primary */
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .item-card img {
        width: 100%;
        aspect-ratio: 1 / 1; /* Keeps images perfectly square */
        object-fit: cover;
        border-radius: 8px;
        background-color: #f8fafc; /* Placeholder bg while loading */
        margin-bottom: 10px;
        display: block;
    }

    .item-card div {
        color: #1e293b; /* Matches --text */
        font-weight: 600;
        font-size: 0.9rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 100%;
    }

    /* Syncing the animation with the main page */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="items-container">
    {% for item in items %}
        <a class="item-card" href="item/{{ item.id }}">
            <img src="api/render?id={{ item.id }}" alt="{{ item.name }}">
            <div>{{ item.name }}</div>
        </a>
    {% endfor %}
</div>
